<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dynamic IOC Fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 32px; line-height: 1.5; }
    button { padding: 8px 12px; font: inherit; }
    #feed { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Dynamic IOC fixture</h1>
  <p>This page starts clean, then appends IOC-rich content on demand.</p>
  <button id="appendDynamicIoc" type="button">Append dynamic IOC</button>
  <div id="feed"></div>
  <script>
    document.getElementById('appendDynamicIoc').addEventListener('click', () => {
      const block = document.createElement('p');
      block.textContent = 'Dynamic IOC observed: 9.9.9.9 and https://dynamic.evil.example/portal';
      document.getElementById('feed').appendChild(block);
    });
  </script>
</body>
</html>
